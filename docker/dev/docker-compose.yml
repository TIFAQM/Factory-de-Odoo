# Persistent Odoo 19.0 CE + PostgreSQL 16 dev instance for MCP introspection
# Usage: scripts/odoo-dev.sh start
# Completely separate from docker/docker-compose.yml (ephemeral validation)
name: odoo-dev

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: ${ODOO_DEV_DB_PASSWORD:?Set ODOO_DEV_DB_PASSWORD in docker/dev/.env}
      POSTGRES_DB: postgres
    volumes:
      - odoo-dev-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    networks:
      - db-internal

  odoo:
    image: odoo:19.0
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${ODOO_DEV_PORT:-8069}:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: ${ODOO_DEV_DB_PASSWORD:?Set ODOO_DEV_DB_PASSWORD in docker/dev/.env}
    volumes:
      - odoo-dev-data:/var/lib/odoo
      - ./odoo.conf:/etc/odoo/odoo.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8069/web/health')\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    networks:
      - db-internal
      - default

networks:
  db-internal:
    internal: true

volumes:
  odoo-dev-db:
  odoo-dev-data:
